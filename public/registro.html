<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta — NALEE's Bakery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header" id="header">
    <div class="header__inner">
      <a href="/" class="header__logo">NALEE's Bakery</a>
      <nav class="header__nav" id="header-nav">
        <a href="/#galletas" class="header__link" data-i18n="nav_galletas">Galletas</a>
        <a href="/#galeria" class="header__link" data-i18n="nav_galeria">Galería</a>
        <a href="/#nosotros" class="header__link" data-i18n="nav_nosotros">Sobre Nosotros</a>
        <a href="/#contacto" class="header__link" data-i18n="nav_contacto">Contacto</a>
      </nav>
      <button class="header__menu-btn" id="menu-btn" aria-label="Menú de navegación">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-card__icon">👨‍🍳</div>
      <h1 class="auth-card__title" data-i18n="auth_registro_title">Crear cuenta</h1>

      <form id="form-registro" novalidate>
        <div class="auth-card__field">
          <label for="registro-nombre" data-i18n="auth_nombre">Nombre</label>
          <input type="text" id="registro-nombre" name="name" required placeholder="Tu nombre">
          <p class="auth-card__error" id="error-nombre"></p>
        </div>

        <div class="auth-card__field">
          <label for="registro-email" data-i18n="auth_email">Email</label>
          <input type="email" id="registro-email" name="email" required placeholder="tu@email.com">
          <p class="auth-card__error" id="error-email"></p>
        </div>

        <div class="auth-card__field">
          <label for="registro-password" data-i18n="auth_password">Contraseña</label>
          <input type="password" id="registro-password" name="password" required minlength="4" placeholder="••••••••">
          <p class="auth-card__error" id="error-password"></p>
        </div>

        <div class="auth-card__field">
          <label for="registro-confirmar" data-i18n="auth_confirmar">Confirmar contraseña</label>
          <input type="password" id="registro-confirmar" name="confirmar" required minlength="4" placeholder="••••••••">
          <p class="auth-card__error" id="error-confirmar"></p>
        </div>

        <p class="auth-card__error auth-card__error--general" id="registro-error"></p>

        <button type="submit" class="auth-card__btn" data-i18n="auth_crear_cuenta">Crear cuenta</button>
      </form>

      <p class="auth-card__link">
        <span data-i18n="auth_ya_cuenta">¿Ya tienes cuenta?</span>
        <a href="/login" data-i18n="auth_entrar_link">Iniciar sesión</a>
      </p>
    </div>
  </main>

  <script src="lang/translations.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
